server:
  port: 9898
  forward-headers-strategy: native

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://mysql-db:3306/auth_db
    username: shopping_user
    password: shopping_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:smart-ai-shopping-dev-secret-key-1234567890}
  expiration-ms: 3600000

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

google:
  oauth-enabled: ${GOOGLE_CLIENT_ID:}

