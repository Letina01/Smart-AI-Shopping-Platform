server:
  port: 9898
  forward-headers-strategy: native

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:smart-ai-shopping-dev-secret-key-1234567890}
  expiration-ms: 3600000

eureka:
  client:
    enabled: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

google:
  oauth-enabled: ${GOOGLE_CLIENT_ID:}

---
spring:
  config:
    activate:
      on-profile: ec2
  h2:
    console:
      enabled: true

eureka:
  client:
    enabled: false
