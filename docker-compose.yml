version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # CORE SERVICES (Enabled for Free Tier)
  # ---------------------------------------------------------------------------

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JAVA_OPTS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_ENABLED=false
      - JWT_SECRET=${JWT_SECRET:-smart-ai-shopping-dev-secret-key-1234567890}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - AUTH_SERVICE_URL=http://auth-service:9898
      - USER_SERVICE_URL=http://user-service:9001
      - PRODUCT_SERVICE_URL=http://product-service:9002
    depends_on:
      - auth-service
      - user-service
      - product-service
    networks:
      - shopping-network

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "9898:9898"
    environment:
      - PORT=9898
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_PROFILES_ACTIVE=ec2
      - EUREKA_CLIENT_ENABLED=false
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_H2_CONSOLE_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-smart-ai-shopping-dev-secret-key-1234567890}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    networks:
      - shopping-network

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports:
      - "9001:9001"
    environment:
      - PORT=9001
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_PROFILES_ACTIVE=ec2
      - EUREKA_CLIENT_ENABLED=false
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
    networks:
      - shopping-network

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    ports:
      - "9002:9002"
    environment:
      - PORT=9002
      - JAVA_OPTS=-Xms128m -Xmx256m
      - SPRING_PROFILES_ACTIVE=ec2
      - EUREKA_CLIENT_ENABLED=false
    networks:
      - shopping-network

