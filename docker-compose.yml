services:
  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    ports:
      - "8761:8761"
    networks:
      - shopping-network

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=smart-ai-shopping-dev-secret-key-1234567890
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - eureka-server
    networks:
      - shopping-network

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "9898:9898"
    environment:
      - SPRING_PROFILES_ACTIVE=${AUTH_SERVICE_PROFILES:-}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=shopping_user
      - SPRING_DATASOURCE_PASSWORD=shopping_pass
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=smart-ai-shopping-dev-secret-key-1234567890
      - FRONTEND_URL=http://localhost:3000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports:
      - "9001:9001"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/user_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=shopping_user
      - SPRING_DATASOURCE_PASSWORD=shopping_pass
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    ports:
      - "9002:9002"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      - eureka-server
      - kafka
      - redis
    networks:
      - shopping-network

  ai-service:
    build:
      context: .
      dockerfile: ./ai-service/Dockerfile
    ports:
      - "9003:9003"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - shopping-network

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    ports:
      - "9004:9004"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/order_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=shopping_user
      - SPRING_DATASOURCE_PASSWORD=shopping_pass
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure
    networks:
      - shopping-network

  history-service:
    build:
      context: .
      dockerfile: ./history-service/Dockerfile
    ports:
      - "9005:9005"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/history_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=shopping_user
      - SPRING_DATASOURCE_PASSWORD=shopping_pass
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: on-failure
    networks:
      - shopping-network

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    ports:
      - "9006:9006"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USER_SERVICE_BASE_URL=${USER_SERVICE_BASE_URL:-http://user-service:9001}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-true}
      - MAIL_SMTP_STARTTLS=${MAIL_SMTP_STARTTLS:-true}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - SMS_PROVIDER_URL=${SMS_PROVIDER_URL:-https://api.twilio.com/2010-04-01/Accounts/%s/Messages.json}
      - SMS_ACCOUNT_ID=${SMS_ACCOUNT_ID:-}
      - SMS_AUTH_TOKEN=${SMS_AUTH_TOKEN:-}
      - SMS_FROM_NUMBER=${SMS_FROM_NUMBER:-}
    depends_on:
      - eureka-server
      - kafka
    networks:
      - shopping-network

  mysql-db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=auth_db
      - MYSQL_USER=shopping_user
      - MYSQL_PASSWORD=shopping_pass
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    networks:
      - shopping-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - shopping-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - shopping-network

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    networks:
      - shopping-network

networks:
  shopping-network:
    driver: bridge

volumes:
  mysql-data:
