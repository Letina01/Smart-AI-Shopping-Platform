services:
  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    expose:
      - "8761"
    environment:
      - PORT=8761
    networks:
      - shopping-network

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - shopping-network

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    expose:
      - "9898"
    environment:
      - PORT=9898
      - SPRING_PROFILES_ACTIVE=${AUTH_SERVICE_PROFILES:-}
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/auth_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    expose:
      - "9001"
    environment:
      - PORT=9001
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/user_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    expose:
      - "9002"
    environment:
      - PORT=9002
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATA_REDIS_HOST=redis
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shopping-network

  ai-service:
    build:
      context: .
      dockerfile: ./ai-service/Dockerfile
    expose:
      - "9003"
    environment:
      - PORT=9003
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - shopping-network

  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile
    expose:
      - "9004"
    environment:
      - PORT=9004
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/order_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  history-service:
    build:
      context: .
      dockerfile: ./history-service/Dockerfile
    expose:
      - "9005"
    environment:
      - PORT=9005
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/history_db?allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATIONFAILTIMEOUT=60000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - shopping-network

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    expose:
      - "9006"
    environment:
      - PORT=9006
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USER_SERVICE_BASE_URL=${USER_SERVICE_BASE_URL:-http://user-service:9001}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-true}
      - MAIL_SMTP_STARTTLS=${MAIL_SMTP_STARTTLS:-true}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - SMS_PROVIDER_URL=${SMS_PROVIDER_URL:-https://api.twilio.com/2010-04-01/Accounts/%s/Messages.json}
      - SMS_ACCOUNT_ID=${SMS_ACCOUNT_ID:-}
      - SMS_AUTH_TOKEN=${SMS_AUTH_TOKEN:-}
      - SMS_FROM_NUMBER=${SMS_FROM_NUMBER:-}
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - shopping-network

  mysql-db:
    image: mysql:8.0
    expose:
      - "3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=auth_db
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s
    networks:
      - shopping-network

  redis:
    image: redis:alpine
    expose:
      - "6379"
    restart: always
    networks:
      - shopping-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - shopping-network
    healthcheck:
      test: ["cmd", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      zookeeper:
        condition: service_healthy
    restart: always
    networks:
      - shopping-network

networks:
  shopping-network:
    driver: bridge

volumes:
  mysql-data: