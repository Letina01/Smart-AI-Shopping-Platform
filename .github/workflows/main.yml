name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: SonarQube Analysis
      run: # mvn sonar:sonar ... (Requires SONAR_TOKEN)
      continue-on-error: true

    - name: Docker Login
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Images
      if: github.event_name != 'pull_request'
      run: |
        services=("eureka-server" "api-gateway" "auth-service" "user-service" "product-service" "ai-service" "order-service" "history-service" "notification-service")
        for service in "${services[@]}"; do
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/smart-ai-$service:latest ./$service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-ai-$service:latest
        done

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to AWS EC2
      run: |
        # ssh -i key.pem ec2-user@ip "docker-compose pull && docker-compose up -d"
        echo "Deployment step simulation"
