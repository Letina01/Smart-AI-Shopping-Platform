name: CD Deploy to AWS EC2 (ECR + SSM)

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: smart-ai-shopping-platform
  DEMO_SERVICES: "eureka-server api-gateway ai-service redis"
  BUILD_SERVICES: "eureka-server api-gateway ai-service"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push service images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ env.ECR_REPOSITORY }}
        run: |
          set -e
          for service in $BUILD_SERVICES; do
            repo_name="${ECR_REPOSITORY_PREFIX}/${service}"
            aws ecr describe-repositories --repository-names "$repo_name" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$repo_name" >/dev/null

            image_latest="$ECR_REGISTRY/$repo_name:latest"
            image_sha="$ECR_REGISTRY/$repo_name:${GITHUB_SHA}"

            docker build -f "./$service/Dockerfile" -t "$image_latest" -t "$image_sha" "."
            docker push "$image_latest"
            docker push "$image_sha"
          done

      - name: Deploy on EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -e
          commands_json=$(jq -nc \
            --arg region "${{ secrets.AWS_REGION }}" \
            --arg reg "$ECR_REGISTRY" \
            --arg repo "${{ env.ECR_REPOSITORY }}" \
            --arg services "${{ env.DEMO_SERVICES }}" \
            '[
              "set -e",
              "APP_DIR=\"\"; if [ -f /root/smart-ai-shopping-platform/docker-compose.yml ]; then APP_DIR=/root/smart-ai-shopping-platform; elif [ -f /home/ec2-user/smart-ai-shopping-platform/docker-compose.yml ]; then APP_DIR=/home/ec2-user/smart-ai-shopping-platform; else echo \"compose files not found\"; exit 1; fi",
              "if command -v docker-compose >/dev/null 2>&1; then DC=\"docker-compose\"; elif docker compose version >/dev/null 2>&1; then DC=\"docker compose\"; else echo \"docker compose not found\"; exit 1; fi",
              ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $reg),
              "cd \"$APP_DIR\"",
              ("ECR_REGISTRY=" + $reg + " ECR_REPOSITORY_PREFIX=" + $repo + " IMAGE_TAG=latest sh -lc \"$DC -f docker-compose.yml -f docker-compose.ecr.yml pull " + $services + "\""),
              ("ECR_REGISTRY=" + $reg + " ECR_REPOSITORY_PREFIX=" + $repo + " IMAGE_TAG=latest sh -lc \"$DC -f docker-compose.yml -f docker-compose.ecr.yml up -d --no-build --remove-orphans " + $services + "\""),
              "sh -lc \"$DC -f docker-compose.yml -f docker-compose.ecr.yml ps\""
            ]')

          command_id=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy demo services on EC2" \
            --timeout-seconds 1800 \
            --parameters "commands=${commands_json}" \
            --query "Command.CommandId" \
            --output text)

          status="InProgress"
          for i in {1..120}; do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text)
            echo "SSM status: $status"
            if [ "$status" = "Success" ] || [ "$status" = "Failed" ] || [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
              break
            fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output json

          if [ "$status" != "Success" ]; then
            exit 1
          fi
