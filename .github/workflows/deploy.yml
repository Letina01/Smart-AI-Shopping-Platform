name: CD Deploy to AWS EC2 (ECR + SSM)

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: smart-ai-shopping-platform
  DEMO_SERVICES: "eureka-server api-gateway ai-service redis"
  BUILD_SERVICES: "eureka-server api-gateway ai-service"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push service images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY_PREFIX: ${{ env.ECR_REPOSITORY }}
        run: |
          set -e
          for service in $BUILD_SERVICES; do
            repo_name="${ECR_REPOSITORY_PREFIX}/${service}"
            aws ecr describe-repositories --repository-names "$repo_name" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$repo_name" >/dev/null

            image_latest="$ECR_REGISTRY/$repo_name:latest"
            image_sha="$ECR_REGISTRY/$repo_name:${GITHUB_SHA}"

            docker build -f "./$service/Dockerfile" -t "$image_latest" -t "$image_sha" "."
            docker push "$image_latest"
            docker push "$image_sha"
          done

      - name: Deploy on EC2 via SSM
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          set -e
          run_ssm() {
            local comment="$1"
            local commands_json="$2"
            local attempt=1
            local max_attempts=2

            while [ $attempt -le $max_attempts ]; do
              echo "Running SSM step: $comment (attempt $attempt/$max_attempts)"
              command_id=$(aws ssm send-command \
                --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
                --document-name "AWS-RunShellScript" \
                --comment "$comment" \
                --timeout-seconds 1800 \
                --parameters "commands=${commands_json}" \
                --query "Command.CommandId" \
                --output text)

              status="InProgress"
              for i in {1..120}; do
                status=$(aws ssm get-command-invocation \
                  --command-id "$command_id" \
                  --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                  --query "Status" \
                  --output text)
                echo "SSM status: $status"
                if [ "$status" = "Success" ] || [ "$status" = "Failed" ] || [ "$status" = "Cancelled" ] || [ "$status" = "TimedOut" ]; then
                  break
                fi
                sleep 10
              done

              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text

              if [ "$status" = "Success" ]; then
                return 0
              fi

              aws ssm get-command-invocation \
                --command-id "$command_id" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              aws ssm list-command-invocations \
                --command-id "$command_id" \
                --details \
                --output json

              if [ $attempt -eq $max_attempts ]; then
                return 1
              fi
              attempt=$((attempt + 1))
              sleep 15
            done
          }

          prep_cmds='[
            "set -e",
            "echo \"SSM prepare started\"",
            "whoami",
            "command -v aws",
            "command -v docker",
            "command -v docker-compose"
          ]'

          deploy_cmds='[
            "set -e",
            "APP_DIR=\"\"; if [ -f /root/smart-ai-shopping-platform/docker-compose.yml ]; then APP_DIR=/root/smart-ai-shopping-platform; elif [ -f /home/ec2-user/smart-ai-shopping-platform/docker-compose.yml ]; then APP_DIR=/home/ec2-user/smart-ai-shopping-platform; else echo \"compose files not found\"; exit 1; fi",
            "echo \"Using APP_DIR=$APP_DIR\"",
            "cd \"$APP_DIR\"",
            "docker rm -f smart-ai-shopping-platform-eureka-server-1 smart-ai-shopping-platform-api-gateway-1 smart-ai-shopping-platform-ai-service-1 smart-ai-shopping-platform-redis-1 || true",
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin '"${ECR_REGISTRY}"'",
            "ECR_REGISTRY='"${ECR_REGISTRY}"' ECR_REPOSITORY_PREFIX=${{ env.ECR_REPOSITORY }} IMAGE_TAG=latest docker-compose -f docker-compose.yml -f docker-compose.ecr.yml pull ${{ env.DEMO_SERVICES }}",
            "ECR_REGISTRY='"${ECR_REGISTRY}"' ECR_REPOSITORY_PREFIX=${{ env.ECR_REPOSITORY }} IMAGE_TAG=latest docker-compose -f docker-compose.yml -f docker-compose.ecr.yml up -d --no-build --remove-orphans ${{ env.DEMO_SERVICES }}"
          ]'

          run_ssm "Prepare EC2 for deploy" "$prep_cmds"
          run_ssm "Deploy demo services on EC2" "$deploy_cmds"
