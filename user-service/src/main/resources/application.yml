server:
  port: 9001

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

eureka:
  client:
    enabled: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: ec2
  h2:
    console:
      enabled: true

eureka:
  client:
    enabled: false
  instance:
    hostname: localhost
