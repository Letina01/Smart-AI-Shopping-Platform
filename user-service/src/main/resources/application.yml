server:
  port: 9001

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://mysql-db:3306/user_db
    username: shopping_user
    password: shopping_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: ec2
  datasource:
    url: jdbc:mysql://mysql-db:3306/user_db

eureka:
  client:
    enabled: false
  enabled: false
