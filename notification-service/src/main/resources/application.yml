server:
  port: 9006

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service:9001}
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@smartaishop.local}}
  sms:
    enabled: ${SMS_ENABLED:false}
    provider-url: ${SMS_PROVIDER_URL:https://api.twilio.com/2010-04-01/Accounts/%s/Messages.json}
    account-id: ${SMS_ACCOUNT_ID:}
    auth-token: ${SMS_AUTH_TOKEN:}
    from-number: ${SMS_FROM_NUMBER:}
