services:
  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=ec2
      - SERVER_PORT=8080
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m -Djava.security.egd=file:/dev/./urandom
      - USER_SERVICE_URL=http://user-service:9001
      - PRODUCT_SERVICE_URL=http://product-service:9002
      - AUTH_SERVICE_URL=http://auth-service:9898
      - JWT_SECRET=${JWT_SECRET:-smart-ai-shopping-dev-secret-key-1234567890}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - EUREKA_CLIENT_ENABLED=false
    depends_on:
      - auth-service
      - user-service
      - product-service
    networks:
      - app-network
    restart: on-failure

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    ports:
      - "9898:9898"
    environment:
      - SPRING_PROFILES_ACTIVE=ec2
      - SERVER_PORT=9898
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_ENABLED=false
      - JWT_SECRET=${JWT_SECRET:-smart-ai-shopping-dev-secret-key-1234567890}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    networks:
      - app-network
    restart: on-failure

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports:
      - "9001:9001"
    environment:
      - SPRING_PROFILES_ACTIVE=ec2
      - SERVER_PORT=9001
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_ENABLED=false
    networks:
      - app-network
    restart: on-failure

  product-service:
    build:
      context: .
      dockerfile: ./product-service/Dockerfile
    ports:
      - "9002:9002"
    environment:
      - SPRING_PROFILES_ACTIVE=ec2
      - SERVER_PORT=9002
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
      - EUREKA_CLIENT_ENABLED=false
    networks:
      - app-network
    restart: on-failure

networks:
  app-network:
    driver: bridge
